model:
  default: z-ai/glm-5.1
  provider: custom
  base_url: https://api.eastrouter.com/v1
  api_key: ${EASTROUTER_API_KEY}
  api_mode: chat_completions

# Planning model (stronger reasoning for sprint planning / architecture)
# Use deepseek/deepseek-v4-pro for heavy planning, z-ai/glm-5.1 for general
# Switch via: hermes model set deepseek/deepseek-v4-pro

memory:
  memory_enabled: true
  user_profile_enabled: true

slack:
  require_mention: true
  allow_bots: mentions            # accepts @mentions from OpenClaw bot
  free_response_channels: ''
  allowed_channels: ''
  channel_prompts: {}

# Channels used in this event:
# #sprint-main   — Human <-> Hermes (sprint goals, planning, decisions)
# #agent-coder   — Hermes <-> OpenClaw (task handoffs)
# #agent-log     — OpenClaw structured reports (What I Did / Left / Call)
# #ci-cd         — CI/test results
# #human-review  — Release-candidate approvals before merge

agent:
  max_turns: 150
  gateway_timeout: 1800
  reasoning_effort: medium
  coding_context: auto

terminal:
  backend: local
  persistent_shell: true
  timeout: 180

custom_providers:
- name: EastRouter
  base_url: https://api.eastrouter.com/v1
  api_key: ${EASTROUTER_API_KEY}
  model: z-ai/glm-5.1
  api_mode: chat_completions

# Model routing strategy (per handbook §02):
#   Planning / architecture  -> deepseek/deepseek-v4-pro  (strong reasoning)
#   General coding           -> z-ai/glm-5.1              (fast, all-round)
#   Cheap iterative edits    -> z-ai/glm-4.5-air          (save credits)
#   Long-horizon coding      -> moonshotai/kimi-k2.7-code (262K context)
